name: expense_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0' # Fixed SDK version

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.7
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  shared_preferences: ^2.2.2
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.1
  intl: ^0.19.0

  # Video Player for your splash animation
  video_player: ^2.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Lowered to ensure compatibility

  # This package replaces the White Screen with Black
  flutter_native_splash: ^2.4.0
  
  # Package for generating app icons
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/splash_video.mp4

flutter_native_splash:
  color: "#000000"
  image: android/app/src/main/res/drawable/app_icon.png
  android_12:
    color: "#000000"
    image: android/app/src/main/res/drawable/app_icon.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "android/app/src/main/res/drawable/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "android/app/src/main/res/drawable/app_icon.png"
